<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: #1a1a1a;
      font-size: 24px;
      font-weight: bold;
    }

    .content {
      padding: 20px;
    }

    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #1a1a1a;
    }

    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border-top: 2px solid transparent;
    }

    .tab.active {
      border-top: 2px solid #f7a400ff;
      color: #f7a400ff;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #f7a400ff;
      cursor: pointer;
      font-weight: bold;
    }

    .calendar-box {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="header">
  Gooner Awards Dashboard
</div>

<div class="content">

  <!-- MAIN PAGE -->
  <div id="home" class="page active">
    <h2>Welcome to the Gooner Awards</h2>
    <p>This is a modern platform where users track activity, compete on leaderboards, manage friends, and log daily values.</p>
  </div>

  <!-- CALENDAR -->
  <div id="calendar" class="page">
    <h2>Calendar</h2>

    <input type="date" id="date">
    <input type="number" id="value" placeholder="Enter value">
    <button onclick="saveCalendar()">Save</button>

    <div id="calendarData"></div>
  </div>

  <!-- OTHER TABS -->
  <div id="leaderboard" class="page"><h2>Leaderboard</h2></div>
  <div id="friends" class="page"><h2>Friends</h2></div>
  <div id="stats" class="page"><h2>Statistics</h2></div>

</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('home', this)">Home</div>
  <div class="tab" onclick="switchTab('calendar', this)">Calendar</div>
  <div class="tab" onclick="switchTab('leaderboard', this)">Leaderboard</div>
  <div class="tab" onclick="switchTab('friends', this)">Friends</div>
  <div class="tab" onclick="switchTab('stats', this)">Stats</div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL";
const userEmail = localStorage.getItem("user"); // simple session

function switchTab(pageId, el) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  if (pageId === "calendar") loadCalendar();
}

async function saveCalendar() {
  const date = document.getElementById("date").value;
  const value = document.getElementById("value").value;

  await fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "saveCalendar",
      email: userEmail,
      date,
      value
    })
  });

  loadCalendar();
}

async function loadCalendar() {
  const res = await fetch(API_URL + "?action=getCalendar&email=" + encodeURIComponent(userEmail));
  const data = await res.json();

  const container = document.getElementById("calendarData");
  container.innerHTML = "";

  data.data.forEach(entry => {
    const div = document.createElement("div");
    div.innerText = entry.date + " → " + entry.value;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
