<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="status"></p>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const url = "https://script.google.com/macros/s/AKfycbyS-svkchvmd4EHLu7MYGe67uab2bX-RqAk3HnCf1kk9EwR-A6LJQBkuXClE98BGzvVFw/exec";

  const res = await fetch(url + "?email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password));
  const data = await res.json();

  if (data.success) {
    document.getElementById("status").innerText = "Login successful!";
  } else {
    document.getElementById("status").innerText = "Invalid login";
  }
}
</script>
